services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: album-sharing-app
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PHOTO_ADMIN_KEY=change-me-admin-key
      - DATABASE_URL=postgres://album_app:album_password@postgres:5432/album_db
    networks:
      - album-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/albums/stats/overview"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:16
    container_name: album-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: album_app
      POSTGRES_PASSWORD: album_password
      POSTGRES_DB: album_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - album-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U album_app -d album_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

networks:
  album-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
